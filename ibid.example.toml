# ibid example configuration. Copy to ibid.toml and edit.
#
# Required: a [discord] block with a token, OR at least one [[networks]]
# block for IRC. You can run both at once — they share plugins and DB.

[bot]
nick = "ibid"
realname = "ibid bot"
# When IRC users type "ibid: cmd" or "ibid, cmd", we strip the addressing.
nick_aliases = ["bot"]
# Anything starting with one of these is treated as an explicit command.
# Discord users mostly want a prefix; IRC users mostly want addressing.
command_prefixes = ["!"]
# If true, the bot ignores anything that isn't explicitly addressed.
addressed_only = false
# SQLAlchemy URL (async). Default is local SQLite.
db_url = "sqlite+aiosqlite:///ibid.db"

[plugins]
# Disable plugins by short name or full module path.
disabled = []

# HTTP client defaults used by URL-fetching plugins.
[http]
timeout_seconds = 8.0
user_agent = "ibid/0.3 (+https://github.com/vhata/ibid)"
max_bytes = 524288

# -------------------------------------------------------------- Discord ---
# Discord is the headline transport. Create an application at
# https://discord.com/developers/applications, enable the Message Content
# privileged intent, copy the token here.
[discord]
token = "REPLACE_ME"
# Optional allow-lists (guild + channel snowflake IDs). Empty = all.
guilds = []
channels = []

# ------------------------------------------------------------------ IRC ---
# Add one [[networks]] block per IRC network. Comment out or delete if you
# only want Discord.

